<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>QuantegyAI - Math Games LMS</title>
    <style>
      /* ADA / WCAG 2.1 accessibility: focus indicators */
      *:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
      button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
      /* Skip link for screen readers and keyboard users */
      .skip-link { position: absolute; top: -40px; left: 0; background: #2563eb; color: #fff; padding: 8px 16px; z-index: 9999; font-weight: 700; border-radius: 0 0 4px 0; transition: top 0.2s; }
      .skip-link:focus { top: 0; outline: 2px solid #fff; outline-offset: 2px; }
      /* Respect reduced motion preference */
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
      /* Screen reader only - visually hidden but announced */
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script>
      if (typeof navigator !== 'undefined' && navigator.serviceWorker && /localhost|127\.0\.0\.1/.test(window.location.hostname)) {
        var key = 'sw-unregistered';
        if (!sessionStorage.getItem(key)) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length) {
              sessionStorage.setItem(key, '1');
              regs.forEach(function(r) { r.unregister(); });
              window.location.reload();
              return;
            }
          });
        } else {
          sessionStorage.removeItem(key);
        }
      }
      window.onerror = function(msg, src, line, col, err) {
        var d = document.getElementById('root');
        if (d && !d.innerHTML.trim()) {
          d.innerHTML = '<div style="padding:40px;font-family:system-ui;max-width:600px;margin:0 auto"><h2 style="color:#dc2626">JavaScript Error</h2><pre style="background:#fef2f2;padding:16px;border-radius:8px;overflow:auto;font-size:13px;border:1px solid #fecaca">' + msg + '\n\nSource: ' + src + ':' + line + ':' + col + (err && err.stack ? '\n\n' + err.stack : '') + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer">Reload</button></div>';
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled rejection:', e.reason);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
