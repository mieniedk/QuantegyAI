<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <polygon points="100,20 155,75 100,160 45,75" fill="#f1f5f9" stroke="#0f172a"/>
  <!-- equal-side tick marks: top pair (AB = AD) -->
  <line x1="126" y1="44" x2="130" y2="52" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="70" y1="52" x2="74" y2="44" stroke="#2563eb" stroke-width="1.8"/>
  <!-- equal-side tick marks: bottom pair (BC = DC) -->
  <line x1="130" y1="114" x2="126" y2="120" stroke="#e11d48" stroke-width="1.8"/>
  <line x1="134" y1="112" x2="130" y2="118" stroke="#e11d48" stroke-width="1.8"/>
  <line x1="74" y1="120" x2="70" y2="114" stroke="#e11d48" stroke-width="1.8"/>
  <line x1="70" y1="118" x2="66" y2="112" stroke="#e11d48" stroke-width="1.8"/>
  <!-- diagonals -->
  <line x1="100" y1="20" x2="100" y2="160" stroke="#2563eb" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="45" y1="75" x2="155" y2="75" stroke="#64748b" stroke-dasharray="5,4" stroke-width="1.5"/>
  <!-- perp mark -->
  <path d="M100,67 L108,67 L108,75" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <!-- labels -->
  <text x="93" y="14" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">A</text>
  <text x="160" y="80" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">B</text>
  <text x="93" y="174" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">C</text>
  <text x="28" y="80" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">D</text>
</svg>
