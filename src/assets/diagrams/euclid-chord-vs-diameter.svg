<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="100" cy="90" r="65" fill="#f1f5f9"/>
  <!-- center dot -->
  <circle cx="100" cy="90" r="3.5" fill="#2563eb" stroke="none"/>
  <text x="104" y="86" font-size="11" fill="#2563eb" stroke="none" font-family="system-ui,sans-serif">O</text>
  <!-- diameter (passes through center) -->
  <line x1="35" y1="90" x2="165" y2="90" stroke="#16a34a" stroke-width="2.5"/>
  <circle cx="35" cy="90" r="3" fill="#16a34a" stroke="none"/>
  <circle cx="165" cy="90" r="3" fill="#16a34a" stroke="none"/>
  <text x="24" y="82" font-size="11" fill="#16a34a" stroke="none" font-family="system-ui,sans-serif">A</text>
  <text x="168" y="82" font-size="11" fill="#16a34a" stroke="none" font-family="system-ui,sans-serif">B</text>
  <text x="62" y="106" font-size="10" fill="#16a34a" stroke="none" font-family="system-ui,sans-serif" font-weight="700">diameter</text>
  <!-- chord (does NOT pass through center) -->
  <line x1="52" y1="38" x2="155" y2="52" stroke="#e11d48" stroke-width="2.5"/>
  <circle cx="52" cy="38" r="3" fill="#e11d48" stroke="none"/>
  <circle cx="155" cy="52" r="3" fill="#e11d48" stroke="none"/>
  <text x="38" y="32" font-size="11" fill="#e11d48" stroke="none" font-family="system-ui,sans-serif">C</text>
  <text x="159" y="48" font-size="11" fill="#e11d48" stroke="none" font-family="system-ui,sans-serif">D</text>
  <text x="82" y="32" font-size="10" fill="#e11d48" stroke="none" font-family="system-ui,sans-serif" font-weight="700">chord</text>
  <!-- "not through center" annotation -->
  <text x="48" y="168" font-size="9.5" fill="#64748b" stroke="none" font-family="system-ui,sans-serif" text-anchor="middle">
    <tspan x="100" dy="0">A chord's endpoints lie on the circle</tspan>
    <tspan x="100" dy="13">but it need not pass through O.</tspan>
  </text>
</svg>
