<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <polygon points="50,130 80,50 160,50 130,130" fill="#f1f5f9" stroke="#0f172a"/>
  <!-- parallel tick marks on AB and DC -->
  <line x1="62" y1="92" x2="68" y2="86" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="142" y1="92" x2="148" y2="86" stroke="#2563eb" stroke-width="1.8"/>
  <!-- parallel tick marks on AD and BC -->
  <line x1="86" y1="52" x2="86" y2="46" stroke="#e11d48" stroke-width="1.8"/>
  <line x1="90" y1="52" x2="90" y2="46" stroke="#e11d48" stroke-width="1.8"/>
  <line x1="124" y1="132" x2="124" y2="126" stroke="#e11d48" stroke-width="1.8"/>
  <line x1="128" y1="132" x2="128" y2="126" stroke="#e11d48" stroke-width="1.8"/>
  <!-- diagonals (bisect each other) -->
  <line x1="50" y1="130" x2="160" y2="50" stroke="#2563eb" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="80" y1="50" x2="130" y2="130" stroke="#2563eb" stroke-dasharray="5,4" stroke-width="1.5"/>
  <circle cx="105" cy="90" r="3" fill="#2563eb" stroke="none"/>
  <!-- labels -->
  <text x="36" y="140" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">A</text>
  <text x="72" y="44" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">B</text>
  <text x="163" y="54" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">C</text>
  <text x="133" y="144" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">D</text>
</svg>
