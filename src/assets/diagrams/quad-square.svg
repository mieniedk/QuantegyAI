<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="40" y="30" width="120" height="120" rx="1" fill="#f1f5f9" stroke="#0f172a"/>
  <!-- right-angle marks -->
  <path d="M40,40 L50,40 L50,30" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M150,30 L150,40 L160,40" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M160,140 L150,140 L150,150" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M50,150 L50,140 L40,140" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <!-- equal-side tick marks -->
  <line x1="98" y1="26" x2="102" y2="34" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="164" y1="88" x2="156" y2="92" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="102" y1="154" x2="98" y2="146" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="36" y1="92" x2="44" y2="88" stroke="#2563eb" stroke-width="1.8"/>
  <!-- diagonals -->
  <line x1="40" y1="30" x2="160" y2="150" stroke="#2563eb" stroke-dasharray="5,4" stroke-width="1.5"/>
  <line x1="160" y1="30" x2="40" y2="150" stroke="#e11d48" stroke-dasharray="5,4" stroke-width="1.5"/>
  <!-- perp mark at center -->
  <path d="M100,82 L108,82 L108,90" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="100" cy="90" r="3" fill="#7c3aed" stroke="none"/>
  <!-- labels -->
  <text x="26" y="27" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">A</text>
  <text x="163" y="27" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">B</text>
  <text x="163" y="164" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">C</text>
  <text x="26" y="164" font-size="12" fill="#1e293b" stroke="none" font-family="system-ui,sans-serif">D</text>
</svg>
